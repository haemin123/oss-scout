# OPTIONAL: Cloud Run deployment configuration.
# OSS Scout runs locally by default (stdio mode).
# Use this file only if deploying to GCP Cloud Run.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: oss-scout
  labels:
    cloud.googleapis.com/location: asia-northeast3
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 10
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/oss-scout/oss-scout:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: GITHUB_TOKEN
              value: ""
            - name: LOG_LEVEL
              value: INFO
            - name: MCP_TRANSPORT
              value: http
            - name: MCP_PORT
              value: "8080"
            - name: CACHE_DIR
              value: /app/.cache
            - name: CACHE_TTL
              value: "86400"
